<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="sfTitle sfDesc">
  <title id="sfTitle">SOLUCIONES FABRICK</title>
  <desc id="sfDesc">Isologo con techo minimalista amarillo industrial y texto blanco.</desc>

  <defs>
    <linearGradient id="sfRoofTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="65%" stop-color="#FFC700"/>
      <stop offset="100%" stop-color="#E2AE00"/>
    </linearGradient>
    <linearGradient id="sfRoofSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A000"/>
      <stop offset="100%" stop-color="#A07400"/>
    </linearGradient>
    <filter id="sfShadow" x="-20%" y="-30%" width="140%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Roof icon -->
  <g transform="translate(120, 30)" filter="url(#sfShadow)">
    <path d="M 0 200 L 180 20 L 360 200 L 330 200 L 180 50 L 30 200 Z" fill="url(#sfRoofTop)"/>
    <path d="M 30 200 L 180 50 L 180 80 L 55 215 L 30 215 Z" fill="url(#sfRoofSide)" opacity="0.95"/>
    <path d="M 330 200 L 180 50 L 180 80 L 305 215 L 330 215 Z" fill="#8A6000" opacity="0.9"/>
    <rect x="236" y="80" width="46" height="70" rx="7" fill="url(#sfRoofTop)"/>
  </g>

  <!-- Text block -->
  <text x="560" y="180" text-anchor="start"
    font-family="Montserrat, Poppins, Arial, sans-serif"
    font-size="88" font-weight="700" letter-spacing="12"
    fill="#FFFFFF" opacity="0.75">SOLUCIONES</text>
  <text x="560" y="310" text-anchor="start"
    font-family="Montserrat, Poppins, Arial, sans-serif"
    font-size="120" font-weight="900" letter-spacing="14"
    fill="#FFFFFF">FABRICK</text>
</svg>
