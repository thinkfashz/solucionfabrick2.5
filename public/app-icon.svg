<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="ai-title">
  <title id="ai-title">Fabrick</title>
  <defs>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="ai-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFC700"/>
    </linearGradient>
    <linearGradient id="ai-depth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B37E00"/>
      <stop offset="100%" stop-color="#D9A100"/>
    </linearGradient>
    <filter id="ai-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#ai-bg)"/>

  <!-- Subtle warm glow -->
  <ellipse cx="256" cy="360" rx="150" ry="50" fill="#FFC700" opacity="0.06"/>

  <!-- Icon: peak scaled to fit — icon ref 38×42, scale 9x → 342×378, center at (256-342/2, 256-378/2) = (85, 67) -->
  <g transform="translate(85, 67) scale(9)" filter="url(#ai-glow)">
    <path d="M 2,42 L 19,4 L 36,42 L 30,42 L 19,12 L 8,42 Z" fill="url(#ai-gold)"/>
    <path d="M 8,42 L 19,12 L 19,18 L 12,42 Z" fill="url(#ai-depth)" opacity="0.75"/>
    <rect x="23" y="10" width="7" height="18" rx="1.5" fill="#FFC700"/>
  </g>
</svg>
