<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" role="img" aria-labelledby="logo-title">
  <title id="logo-title">Soluciones Fabrick</title>
  <defs>
    <linearGradient id="sfRoofTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="65%" stop-color="#FFC700"/>
      <stop offset="100%" stop-color="#E2AE00"/>
    </linearGradient>
    <linearGradient id="sfRoofSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2AE00"/>
      <stop offset="100%" stop-color="#BC8D00"/>
    </linearGradient>
    <linearGradient id="sfRoofSideR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CFA000"/>
      <stop offset="100%" stop-color="#9E7800"/>
    </linearGradient>
    <filter id="sfShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="sfTextGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="100%" stop-color="#FFC700"/>
    </linearGradient>
  </defs>

  <!-- Cercha (roof/truss) centered at top -->
  <g filter="url(#sfShadow)">
    <path d="M 150 88 L 300 22 L 450 88 L 428 88 L 300 38 L 172 88 Z" fill="url(#sfRoofTop)"/>
    <path d="M 172 88 L 300 38 L 300 52 L 186 94 L 172 94 Z" fill="url(#sfRoofSide)" opacity="0.95"/>
    <path d="M 428 88 L 300 38 L 300 52 L 414 94 L 428 94 Z" fill="url(#sfRoofSideR)" opacity="0.9"/>
    <rect x="360" y="44" width="22" height="38" rx="4" fill="url(#sfRoofTop)"/>
    <rect x="363" y="48" width="16" height="32" rx="3" fill="#E9B600"/>
  </g>

  <!-- SOLUCIONES (white, smaller tracking) -->
  <text
    x="300" y="132"
    text-anchor="middle"
    font-family="Montserrat, Poppins, Arial, sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="10"
    fill="#FFFFFF"
  >SOLUCIONES</text>

  <!-- FABRICK (gold, bold) -->
  <text
    x="300" y="176"
    text-anchor="middle"
    font-family="Montserrat, Poppins, Arial, sans-serif"
    font-size="46"
    font-weight="900"
    letter-spacing="14"
    fill="url(#sfTextGold)"
  >FABRICK</text>
</svg>
