<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 214 52" role="img" aria-labelledby="sf-title">
  <title id="sf-title">Soluciones Fabrick</title>
  <defs>
    <linearGradient id="sf-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFC700"/>
    </linearGradient>
    <linearGradient id="sf-depth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B37E00"/>
      <stop offset="100%" stop-color="#D9A100"/>
    </linearGradient>
  </defs>

  <!-- Icon: bold architectural peak -->
  <path d="M 2,46 L 21,4 L 40,46 L 33,46 L 21,13 L 9,46 Z" fill="url(#sf-gold)"/>
  <path d="M 9,46 L 21,13 L 21,19 L 14,46 Z" fill="url(#sf-depth)" opacity="0.75"/>
  <rect x="25" y="11" width="8" height="20" rx="1.5" fill="#FFC700"/>

  <!-- Separator -->
  <line x1="52" y1="9" x2="52" y2="44" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>

  <!-- Wordmark: optimised for dark backgrounds -->
  <text x="61" y="26" font-family="Montserrat, Poppins, Arial, sans-serif" font-size="9.5" font-weight="500" letter-spacing="3" fill="rgba(255,255,255,0.5)">SOLUCIONES</text>
  <text x="60" y="47" font-family="Montserrat, Poppins, Arial, sans-serif" font-size="25" font-weight="900" letter-spacing="1.5" fill="#FFFFFF">FABRICK</text>
</svg>
