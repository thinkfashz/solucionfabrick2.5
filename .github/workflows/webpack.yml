name: Next.js Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Node 18 omitted: globalThis.crypto was added in Node 19, but Next.js 15
        # and our own csp.ts depend on it. Vercel runs Node 20, so 20.x + 22.x
        # is what we actually ship against.
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Build
      run: |
        npm install
        npm run build

    - name: Test
      run: npm test
