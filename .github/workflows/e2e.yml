name: E2E (Playwright)

# Runs Playwright against the deployed Vercel preview URL on PRs and against
# production after every push to main. Skipped automatically when the preview
# URL cannot be obtained (e.g. forks without secrets).

on:
  deployment_status:

jobs:
  e2e:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Probe preview deployment
        id: probe
        env:
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "No target_url provided; skipping E2E."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 -L "$TARGET_URL/" || echo "000")
          echo "Probe status: $status"
          if [ "$status" = "401" ] || [ "$status" = "403" ]; then
            echo "Preview is auth-gated (HTTP $status); skipping E2E run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browsers
        if: steps.probe.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright against preview
        if: steps.probe.outputs.skip != 'true'
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore
