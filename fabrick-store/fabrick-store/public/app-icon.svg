<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Fabrick app icon</title>
  <desc id="desc">Icono cuadrado para app con techo industrial amarillo y monograma F.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE17A"/>
      <stop offset="65%" stop-color="#FFC700"/>
      <stop offset="100%" stop-color="#D79F00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <path d="M98 214 L256 104 L414 214 L381 214 L256 136 L131 214 Z" fill="url(#roof)"/>
    <rect x="310" y="132" width="34" height="62" rx="8" fill="#FFC700"/>
    <path d="M140 236 H372" stroke="#F1B900" stroke-width="16" stroke-linecap="round" opacity="0.92"/>
  </g>
  <g transform="translate(0 10)">
    <text x="256" y="356" text-anchor="middle" font-family="Montserrat, Poppins, Arial, sans-serif" font-size="182" font-weight="900" letter-spacing="4" fill="#1A1A1A">F</text>
    <text x="256" y="346" text-anchor="middle" font-family="Montserrat, Poppins, Arial, sans-serif" font-size="182" font-weight="900" letter-spacing="4" fill="#FFFFFF" opacity="0.08">F</text>
  </g>
</svg>
